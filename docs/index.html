/* =========================================================
   Incline Financial — Design Tokens
   Uber-inspired: stark monochrome, pill-shaped UI, geometric type
   ========================================================= */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@400;500;600&family=Instrument+Sans:wght@400;500;600&display=swap');

:root {
  /* ---------- Color: Primary ---------- */
  --incline-black: #000000;
  --incline-white: #ffffff;

  /* ---------- Color: Accent (deep gold) ---------- */
  --accent: #b8893a;
  --accent-deep: #8d6724;
  --accent-soft: #e8d6a8;
  --accent-bg: #f6efdc;

  /* ---------- Color: Interactive / Hover ---------- */
  --hover-gray: #e2e2e2;
  --hover-light: #f3f3f3;
  --chip-gray: #efefef;

  /* ---------- Color: Text ---------- */
  --body-gray: #4b4b4b;
  --muted-gray: #afafaf;

  /* ---------- Color: Borders ---------- */
  --border-black: #000000;
  --border-subtle: #e2e2e2;

  /* ---------- Color: Shadows ---------- */
  --shadow-light: rgba(0, 0, 0, 0.12);
  --shadow-medium: rgba(0, 0, 0, 0.16);
  --shadow-press: rgba(0, 0, 0, 0.08);

  /* ---------- Color: Links ---------- */
  --link-blue: #0000ee;
  --link-white: #ffffff;
  --link-black: #000000;

  /* ---------- Semantic foreground/background ---------- */
  --fg-1: #000000;          /* Primary text */
  --fg-2: #4b4b4b;          /* Secondary text */
  --fg-3: #afafaf;          /* Tertiary / muted */
  --fg-inverse: #ffffff;    /* On dark surfaces */

  --bg-1: #ffffff;          /* Page surface */
  --bg-2: #f3f3f3;          /* Subtle surface */
  --bg-3: #efefef;          /* Chip surface */
  --bg-inverse: #000000;    /* Footer, hero on black */

  /* ---------- Typography: Families ---------- */
  /* NOTE: UberMove is proprietary. Inter is used as the closest
     geometric sans-serif substitute available on Google Fonts. */
  --font-display: 'Inter', system-ui, 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-body: 'Inter', system-ui, 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;

  /* ---------- Typography: Sizes ---------- */
  --fs-display: 52px;       /* Hero billboard */
  --fs-h1: 36px;            /* Section heading */
  --fs-h2: 32px;            /* Card title */
  --fs-h3: 24px;            /* Sub-heading */
  --fs-h4: 20px;            /* Small heading */
  --fs-nav: 18px;           /* Nav / UI Large */
  --fs-body: 16px;          /* Body / button */
  --fs-caption: 14px;       /* Caption */
  --fs-micro: 12px;         /* Fine print */

  /* ---------- Typography: Line heights ---------- */
  --lh-display: 1.23;
  --lh-h1: 1.22;
  --lh-h2: 1.25;
  --lh-h3: 1.33;
  --lh-h4: 1.40;
  --lh-body: 1.50;
  --lh-tight: 1.25;
  --lh-relaxed: 1.67;

  /* ---------- Typography: Weights ---------- */
  --fw-regular: 400;
  --fw-medium: 500;
  --fw-bold: 700;

  /* ---------- Spacing (8px base) ---------- */
  --space-1: 4px;
  --space-2: 6px;
  --space-3: 8px;
  --space-4: 10px;
  --space-5: 12px;
  --space-6: 14px;
  --space-7: 16px;
  --space-8: 18px;
  --space-9: 20px;
  --space-10: 24px;
  --space-11: 32px;
  --space-12: 48px;
  --space-13: 64px;
  --space-14: 96px;

  /* ---------- Radii ---------- */
  --radius-sharp: 0px;
  --radius-card: 8px;
  --radius-card-lg: 12px;
  --radius-pill: 999px;
  --radius-circle: 50%;

  /* ---------- Shadows / Elevation ---------- */
  --elev-0: none;
  --elev-1: 0 4px 16px rgba(0, 0, 0, 0.12);
  --elev-2: 0 4px 16px rgba(0, 0, 0, 0.16);
  --elev-3: 0 2px 8px rgba(0, 0, 0, 0.16);
  --elev-press: inset 0 0 0 999px rgba(0, 0, 0, 0.08);
  --focus-ring: inset 0 0 0 2px rgb(255, 255, 255);

  /* ---------- Layout ---------- */
  --container-max: 1136px;
  --nav-height: 64px;

  /* ---------- Motion ---------- */
  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
  --duration-fast: 120ms;
  --duration-base: 200ms;
  --duration-slow: 300ms;
}

/* =========================================================
   Base typography reset
   ========================================================= */
html, body {
  font-family: var(--font-body);
  color: var(--fg-1);
  background: var(--bg-1);
  font-size: var(--fs-body);
  line-height: var(--lh-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* =========================================================
   Semantic type roles
   ========================================================= */
.t-display {
  font-family: var(--font-display);
  font-size: var(--fs-display);
  font-weight: var(--fw-bold);
  line-height: var(--lh-display);
  letter-spacing: -0.02em;
  color: var(--fg-1);
}

.t-h1 {
  font-family: var(--font-display);
  font-size: var(--fs-h1);
  font-weight: var(--fw-bold);
  line-height: var(--lh-h1);
  letter-spacing: -0.01em;
  color: var(--fg-1);
}

.t-h2 {
  font-family: var(--font-display);
  font-size: var(--fs-h2);
  font-weight: var(--fw-bold);
  line-height: var(--lh-h2);
  letter-spacing: -0.01em;
  color: var(--fg-1);
}

.t-h3 {
  font-family: var(--font-display);
  font-size: var(--fs-h3);
  font-weight: var(--fw-bold);
  line-height: var(--lh-h3);
  color: var(--fg-1);
}

.t-h4 {
  font-family: var(--font-display);
  font-size: var(--fs-h4);
  font-weight: var(--fw-bold);
  line-height: var(--lh-h4);
  color: var(--fg-1);
}

.t-nav {
  font-family: var(--font-body);
  font-size: var(--fs-nav);
  font-weight: var(--fw-medium);
  line-height: var(--lh-h3);
  color: var(--fg-1);
}

.t-body {
  font-family: var(--font-body);
  font-size: var(--fs-body);
  font-weight: var(--fw-regular);
  line-height: var(--lh-body);
  color: var(--fg-1);
}

.t-body-medium {
  font-family: var(--font-body);
  font-size: var(--fs-body);
  font-weight: var(--fw-medium);
  line-height: var(--lh-tight);
  color: var(--fg-1);
}

.t-caption {
  font-family: var(--font-body);
  font-size: var(--fs-caption);
  font-weight: var(--fw-regular);
  line-height: 1.43;
  color: var(--fg-2);
}

.t-micro {
  font-family: var(--font-body);
  font-size: var(--fs-micro);
  font-weight: var(--fw-regular);
  line-height: var(--lh-relaxed);
  color: var(--fg-2);
}

/* =========================================================
   Reusable pill button base
   ========================================================= */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: none;
  border-radius: var(--radius-pill);
  font-family: var(--font-body);
  font-size: var(--fs-body);
  font-weight: var(--fw-medium);
  line-height: 1;
  cursor: pointer;
  transition: background-color var(--duration-fast) var(--ease-standard),
              color var(--duration-fast) var(--ease-standard),
              box-shadow var(--duration-fast) var(--ease-standard);
  white-space: nowrap;
  text-decoration: none;
}

.btn-primary {
  background: var(--incline-black);
  color: var(--incline-white);
  padding: 14px 20px;
}
.btn-primary:hover { background: #1a1a1a; }
.btn-primary:active { box-shadow: var(--elev-press); }

.btn-secondary {
  background: var(--incline-white);
  color: var(--incline-black);
  padding: 14px 20px;
  box-shadow: inset 0 0 0 1px var(--incline-black);
}
.btn-secondary:hover { background: var(--hover-gray); }

.btn-chip {
  background: var(--chip-gray);
  color: var(--incline-black);
  padding: 14px 16px;
  font-size: var(--fs-caption);
}
.btn-chip:hover { background: var(--hover-gray); }
.btn-chip[aria-pressed="true"],
.btn-chip.is-active {
  background: var(--incline-black);
  color: var(--incline-white);
}

/* =========================================================
   Incline Financial — Site styles (full spec rebuild)
   ========================================================= */

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: #ececec;
  color: #000;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; }
button { font: inherit; }
h1, h2, h3, h4, p { margin: 0; }
ul { margin: 0; padding: 0; list-style: none; }

.container { max-width: 1136px; margin: 0 auto; padding: 0 32px; }

/* =========================================================
   Topbar (above sticky nav)
   ========================================================= */
.topbar {
  background: #000;
  color: #fff;
  font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.topbar-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 10px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.topbar-tag { color: rgba(255,255,255,0.7); letter-spacing: 0.01em; }
.topbar-actions { display: flex; align-items: center; gap: 16px; }
.topbar-phone {
  display: inline-flex; align-items: center; gap: 6px;
  color: #fff; text-decoration: none; font-weight: 600;
}
.topbar-phone:hover { color: rgba(255,255,255,0.85); }
@media (max-width: 720px) {
  .topbar-tag { display: none; }
  .topbar-inner { justify-content: center; }
}

/* =========================================================
   Page shell + sticky nav
   ========================================================= */
.page-shell {
  max-width: 1280px;
  margin: 0 auto;
  background: #f5f5f5;
}

.nav-sticky {
  position: sticky;
  top: 0;
  z-index: 50;
  background: #f5f5f5;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 32px;
  gap: 24px;
  border-bottom: 1px solid transparent;
  transition: border-color 200ms ease, background 200ms ease, box-shadow 200ms ease;
}
.nav-sticky.scrolled {
  background: rgba(245,245,245,0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom-color: rgba(0,0,0,0.06);
}
.nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #000; font-weight: 700; font-size: 19px; letter-spacing: -0.02em; }
.nav-brand .brand-mark { width: 32px; height: 32px; background: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.nav-brand .brand-mark svg path { fill: #fff; }
.nav-links { display: flex; gap: 4px; }
.nav-link { padding: 8px 14px; font-size: 14px; font-weight: 500; color: #4b4b4b; text-decoration: none; border-radius: 999px; }
.nav-link:hover { color: #000; }
.nav-link.active { color: #000; font-weight: 600; }
.nav-actions { display: flex; align-items: center; gap: 8px; }
.nav-phone { font-size: 13px; color: #4b4b4b; text-decoration: none; padding: 8px 12px; border-radius: 999px; font-weight: 500; }
.nav-phone:hover { color: #000; background: rgba(0,0,0,0.04); }

@media (max-width: 980px) {
  .nav-links { display: none; }
  .nav-phone { display: none; }
}

/* =========================================================
   Mobile sticky bar
   ========================================================= */
.mobile-sticky {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 60;
  background: #fff;
  border-top: 1px solid #e2e2e2;
  padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
  gap: 10px;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
}
.mobile-sticky .ms-btn {
  flex: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: 999px;
  padding: 14px 16px;
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  white-space: nowrap;
}
.ms-call { background: #f3f3f3; color: #000; flex: 0 0 auto; padding: 14px 18px; }
.ms-book { background: #000; color: #fff; }
@media (max-width: 720px) {
  .mobile-sticky { display: flex; }
  body { padding-bottom: 72px; }
}

/* =========================================================
   Buttons
   ========================================================= */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: none;
  cursor: pointer;
  border-radius: 999px;
  font-weight: 500;
  white-space: nowrap;
  text-decoration: none;
  transition: background 150ms ease, color 150ms ease, box-shadow 150ms ease;
  padding: 12px 18px;
  font-size: 14px;
  line-height: 1;
}
.btn.lg { padding: 16px 24px; font-size: 15px; font-weight: 600; }
.btn-primary { background: #000; color: #fff; }
.btn-primary:hover { background: #1a1a1a; }
.btn-primary:active { box-shadow: inset 0 0 0 999px rgba(255,255,255,0.06); }
.btn-secondary { background: transparent; color: #000; box-shadow: inset 0 0 0 1px #000; }
.btn-secondary:hover { background: rgba(0,0,0,0.04); }
.btn-on-dark { background: #fff; color: #000; }
.btn-on-dark:hover { background: #e2e2e2; }
.btn-ghost-on-dark { background: transparent; color: #fff; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4); }
.btn-ghost-on-dark:hover { background: rgba(255,255,255,0.08); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.7); }
.btn-ghost { background: transparent; color: #000; padding: 10px 14px; font-size: 14px; }
.btn-ghost:hover { background: rgba(0,0,0,0.05); }

/* =========================================================
   Type primitives
   ========================================================= */
.h1 {
  font-size: clamp(28px, 3.4vw, 44px);
  font-weight: 700;
  line-height: 1.12;
  letter-spacing: -0.025em;
  text-wrap: balance;
}
.h2 {
  font-size: clamp(22px, 2.4vw, 30px);
  font-weight: 700;
  line-height: 1.18;
  letter-spacing: -0.02em;
}
.lead { font-size: 16px; line-height: 1.6; color: #4b4b4b; }
.lead-emph { color: #000; font-weight: 500; }
.muted { color: #4b4b4b; }
.eyebrow {
  display: inline-block;
  font-size: 12px;
  font-weight: 600;
  color: #000;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.eyebrow.dot::before {
  content: ""; display: inline-block;
  width: 6px; height: 6px;
  background: #000; border-radius: 50%;
  margin-right: 8px; vertical-align: middle;
}
.section-head { text-align: center; max-width: 720px; margin: 0 auto 56px; }
.section-head .h1 { margin-top: 14px; }
.section-head .lead { margin-top: 18px; max-width: 560px; margin-left: auto; margin-right: auto; }

/* =========================================================
   HERO (home, about, services, contact)
   ========================================================= */
.hero-big { padding: 32px 24px 0; }
.hb-card {
  background: #e5e5e5;
  border-radius: 28px;
  padding: 64px 56px;
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  gap: 48px;
  position: relative;
  overflow: hidden;
  max-width: 1232px;
  margin: 0 auto;
  min-height: 580px;
  align-items: center;
}
.hb-text { position: relative; z-index: 1; max-width: 540px; }
.hb-title {
  font-size: clamp(40px, 5.4vw, 76px);
  font-weight: 700;
  line-height: 1.0;
  letter-spacing: -0.035em;
  margin-bottom: 24px;
  text-wrap: balance;
}
.hb-title-emph { color: #000; }
.hb-title-emph::after {
  content: "";
  display: inline-block;
  width: 0.42em;
  height: 0.42em;
  background: #000;
  border-radius: 999px;
  margin-left: 0.1em;
  vertical-align: 0.05em;
  transform: translateY(0.05em);

  font-size: 16px;

.hb-cta-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.hb-trust {

  margin-top: 32px;

.hb-trust-dots { display: inline-flex; }
.hb-trust-dots span {
  width: 24px; height: 24px; border-radius: 50%;

.hb-trust-dots span:nth-child(1) { background: #000; }
.hb-trust-dots span:nth-child(2) { background: #4b4b4b; margin-left: -8px; }
.hb-trust-dots span:nth-child(3) { background: #afafaf; margin-left: -8px; }

  height: 480px;
  width: 100%;
}

  <script type="text/babel">
/* App shell — router */

function startCounter(el) {
  if (el.dataset.counterDone) return;
  el.dataset.counterDone = '1';
  const target = parseFloat(el.dataset.counterTarget);
  const format = el.dataset.counterFormat || 'integer';
  const duration = parseInt(el.dataset.counterDuration || '800', 10);
  const start = performance.now();
  const ease = (t) => 1 - Math.pow(1 - t, 3);
  const fmt = (n) => {
    if (format === 'decimal') return n.toFixed(1);
    if (format === 'comma') return Math.round(n).toLocaleString('en-GB');
    return Math.round(n).toString();
  };
  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    el.textContent = fmt(target * ease(t));
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
window.startCounter = startCounter;

function App() {
  const [path, setPath] = React.useState(() => {
    const h = window.location.hash.replace(/^#/, '');
    return h && h.startsWith('/') ? h : '/';
  });

  React.useEffect(() => {
    window.navigate = (to) => {
      window.location.hash = to;
      setPath(to);
      window.scrollTo({ top: 0, behavior: 'instant' });
    };
    const onHash = () => {
      const h = window.location.hash.replace(/^#/, '');
      setPath(h && h.startsWith('/') ? h : '/');
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // Animation orchestration — runs after each route mount
  React.useEffect(() => {
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) {
      document.querySelectorAll('[data-counter-target]:not([data-counter-done])').forEach(el => {
        const t = parseFloat(el.dataset.counterTarget);
        const f = el.dataset.counterFormat || 'integer';
        el.textContent = f === 'decimal' ? t.toFixed(1) : f === 'comma' ? Math.round(t).toLocaleString('en-GB') : Math.round(t).toString();
        el.dataset.counterDone = '1';
      });
      return;
    }

    // Stagger index on grid children (idempotent)
    document.querySelectorAll('.wwd-grid, .who-grid, .tiers-grid, .test-grid, .values-grid, .how-list, .every-grid, .vs-table').forEach(g => {
      if (g.dataset.staggered) return;
      g.dataset.staggered = '1';
      const kids = (g.classList.contains('vs-table'))
        ? g.querySelectorAll(':scope > .vs-row:not(.vs-row-head)')
        : g.children;
      [...kids].forEach((c, i) => c.style.setProperty('--stagger-i', i));
    });

    // Singleton observer — adds .in once, then unobserves so it never re-fires
    if (!window.__inclineIO) {
      window.__inclineIO = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('in');
            window.__inclineIO.unobserve(entry.target);
            if (entry.target.matches('[data-counter-target]')) {
              startCounter(entry.target);
            }
          }
        });
      }, { rootMargin: '0px 0px -8% 0px', threshold: 0.05 });
    }
    document.querySelectorAll('main section:not(.hero-big):not(.in), .wwd-grid:not(.in), .who-grid:not(.in), .tiers-grid:not(.in), .test-grid:not(.in), .values-grid:not(.in), .how-list:not(.in), .every-grid:not(.in), .vs-table:not(.in)').forEach(el => {
      window.__inclineIO.observe(el);
    });

    // Hero mock dashboard slide-in + sequential figure counters (home-page only)
    const mocks = document.querySelector('.hb-mocks');
    if (mocks && !mocks.dataset.animated) {
      mocks.dataset.animated = '1';
      requestAnimationFrame(() => {
        mocks.classList.add('in');
        setTimeout(() => {
          const figures = mocks.querySelectorAll('[data-counter-target]');
          figures.forEach((f, i) => setTimeout(() => startCounter(f), i * 150));
        }, 600);
      });
    }
  }, [path]);

  let Page = HomePage;
  if (path === '/about') Page = AboutPage;
  else if (path === '/services') Page = ServicesPage;
  else if (path === '/contact') Page = ContactPage;

  const skipFooter = false;

  return (
    <div className="anim" data-screen-label={"Page: " + path}>
      <TopBar />
      <div className="page-shell">
        <Nav current={path} />
        <main>
          <Page />
        </main>
        {!skipFooter && <Footer />}
      </div>
      <MobileStickyBar />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
